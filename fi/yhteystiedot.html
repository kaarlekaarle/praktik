    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LegalService",
      "name": "Praktik",
      "alternateName": "Lakiasiaintoimisto Praktik Oy",
      "url": "https://praktik.fi",
      "logo": "https://praktik.fi/og-image.png",
      "description": "Praktik on helsinkiläinen lakiasiaintoimisto, joka kukoistaa vaikeissa kysymyksissä. Ratkaisemme kiperimmät oikeudelliset ongelmasi.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Hitsaajankatu 22–24",
        "postalCode": "00810",
        "addressLocality": "Helsinki",
        "addressCountry": "FI"
      },
      "telephone": "+358451780003",
      "email": "contact@praktik.fi",
      "areaServed": ["FI", "SE", "GB"],
      "availableLanguage": ["Finnish", "Swedish", "English"],
      "priceRange": "$$",
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
        "opens": "09:00",
        "closes": "17:00"
      }
    }
    </script>

  <body class="page-fixed-frame page-yhteystiedot">
    <div id="nav-placeholder"></div>

    <div class="illustration" aria-hidden="true" data-illustration="lepo"
      style="--il-w: auto; --il-top: auto; --il-right: auto; --il-bottom: auto; --il-left: auto;"></div>

    <main class="site-main">
      <div class="contact-inner">
        <h1>Ota yhteyttä</h1>

        <form class="contact-form" action="#" method="POST">
          <textarea class="contact-field contact-field--message" name="viesti" placeholder="Viesti" autocomplete="off" required></textarea>
          <div class="contact-form-row">
            <input class="contact-field" type="text" name="nimi" placeholder="Nimi" autocomplete="name" required>
            <input class="contact-field" type="text" name="yhteystieto" placeholder="Sähköposti tai puhelin" autocomplete="email" required>
          </div>
          <button class="contact-submit" type="submit">Lähetä</button>
          <p class="contact-success" hidden>Viesti lähetetty.</p>
        </form>

        <div class="contact-details">
          <a href="mailto:contact@praktik.fi">contact@praktik.fi</a>
          <a href="tel:+358451780003">+358 (0) 45 178 00 03</a>
          <span>Hitsaajankatu 22–24, 00810 Helsinki</span>
          <span>Palvelemme suomeksi, ruotsiksi ja englanniksi</span>
        </div>
      </div>
    </main>

    <div id="footer"></div>

      import { initPage } from '/js/main.js';
